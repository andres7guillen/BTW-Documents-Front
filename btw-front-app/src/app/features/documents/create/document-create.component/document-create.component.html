<div class="container mt-4">
    <h2>Crear Documento</h2>

    <form [formGroup]="form" (ngSubmit)="save()">

        <div class="mb-3">
            <label>Legal Number</label>
            <input class="form-control" formControlName="legalNumber">
        </div>

        <div class="mb-3">
            <label>Tipo</label>
            <select class="form-control" formControlName="type">
                <option value="Invoice">Factura</option>
                <option value="CreditNote">Nota Crédito</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Emitter NIT</label>
            <input class="form-control" formControlName="emitterNit">
        </div>

        <div class="mb-3">
            <label>Emitter Name</label>
            <input class="form-control" formControlName="emitterName">
        </div>

        <div class="mb-3">
            <label>Receiver NIT</label>
            <input class="form-control" formControlName="receiverNit">
        </div>

        <div class="mb-3">
            <label>Receiver Name</label>
            <input class="form-control" formControlName="receiverName">
        </div>

        <!-- SOLO PARA CREDIT NOTE -->
        <div class="mb-3" *ngIf="form.value.type === 'CreditNote'">
            <label>Factura Referencia</label>

            <select class="form-control" formControlName="referenceDocumentId">
                <option value="">Seleccione una factura</option>

                <option *ngFor="let inv of invoices" [value]="inv.id">
                    {{ inv.legalNumber }}
                </option>
            </select>
        </div>

        <!-- BOTÓN MODAL -->
        <button type="button" class="btn btn-primary mb-2" data-bs-toggle="modal" data-bs-target="#itemModal">
            Agregar Item
        </button>

        <!-- LISTA DE ITEMS -->
        <table class="table table-sm" *ngIf="items.length > 0">
            <thead>
                <tr>
                    <th>Descripción</th>
                    <th>Cantidad</th>
                    <th>Valor</th>
                    <th>Subtotal</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let item of items.controls; let i = index">
                    <td>{{ item.value.description }}</td>
                    <td>{{ item.value.quantity }}</td>
                    <td>{{ item.value.unitValue }}</td>
                    <td>{{ item.value.quantity * item.value.unitValue }}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" (click)="removeItem(i)" type="button">
                            X
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>

        <h5>Total: {{ total | currency }}</h5>

        <button class="btn btn-success" [disabled]="form.invalid || items.length === 0">
            Guardar
        </button>
        <a routerLink="/documents" class="btn btn-secondary ms-2">Volver</a>

    </form>
</div>

<!-- Modal add Item -->
<div class="modal fade" id="itemModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Agregar Item</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body" [formGroup]="itemForm">

                <input class="form-control mb-2" placeholder="Descripción" formControlName="description">

                <input type="number" class="form-control mb-2" placeholder="Cantidad" formControlName="quantity">

                <input type="number" class="form-control mb-2" placeholder="Valor Unitario" formControlName="unitValue">

            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" (click)="addItemFromModal()" data-bs-dismiss="modal">
                    Agregar
                </button>
            </div>

        </div>
    </div>
</div>
